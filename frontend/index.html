<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyTrail Planner</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>StudyTrail AI Planner</h1>
      <p>Create a weekly, personalized study plan.</p>

      <form id="planner-form">
        <label>Week start date
          <input type="date" id="week_start_date" required />
        </label>

        <label>Preferred style
          <select id="study_style">
            <option value="balanced">Balanced</option>
            <option value="more_practice">More practice</option>
            <option value="more_theory">More theory</option>
          </select>
        </label>

        <fieldset>
          <legend>Daily study hours</legend>
          <div class="grid" id="daily-hours-grid"></div>
        </fieldset>

        <fieldset>
          <legend>Subjects (name:importance 1-5)</legend>
          <textarea id="subjects" rows="4" placeholder="Algorithms:5&#10;Databases:4" required></textarea>
        </fieldset>

        <fieldset>
          <legend>Tasks (subject,title,due_date,minutes,type,topic)</legend>
          <textarea id="tasks" rows="6" placeholder="Algorithms,Midterm,2026-03-28,300,exam,Graph algorithms&#10;Databases,Assignment 2,2026-03-27,180,assignment,Normalization" required></textarea>
        </fieldset>

        <label>Backend URL
          <input type="url" id="backend_url" value="http://127.0.0.1:8000" required />
        </label>

        <button type="submit">Generate plan</button>
      </form>

      <section>
        <h2>Weekly schedule</h2>
        <div id="status"></div>
        <table id="plan-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Day</th>
              <th>Subject</th>
              <th>Topic</th>
              <th>Minutes</th>
              <th>Activity</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </div>
  </body>
</html>
